name: Deploy UmaCore Bot to Azure VM

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'terraform/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/umacore_key
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          sed -i 's/\r$//' ~/.ssh/umacore_key
          chmod 600 ~/.ssh/umacore_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Azure VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          SSH_KEY: ~/.ssh/umacore_key
        run: |
          SSH_CMD="ssh -i $SSH_KEY -o StrictHostKeyChecking=no $VM_USER@$VM_HOST"

          # Sync project files (exclude .git, terraform, docs)
          rsync -avz --delete \
            -e "ssh -i $SSH_KEY -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'terraform' \
            --exclude 'docs' \
            --exclude '.env' \
            --exclude 'logs' \
            --exclude 'debug' \
            --exclude '.ssh' \
            --exclude '*.tar.gz' \
            --exclude '__pycache__' \
            ./ $VM_USER@$VM_HOST:/opt/umacore/

          # Create .env on the VM
          $SSH_CMD "cat > /opt/umacore/.env << 'ENVEOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID=${{ secrets.CHANNEL_ID }}
          DATABASE_URL=postgresql://umacore:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/umacore
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          USE_UMAMOE_API=${{ secrets.USE_UMAMOE_API }}
          ENVEOF"

          # Build and deploy
          $SSH_CMD "cd /opt/umacore && docker compose -f docker-compose.prod.yml up -d --build"
