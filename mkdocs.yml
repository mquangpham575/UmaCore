site_name: UmaCore
site_description: Discord bot for tracking Umamusume club quotas
site_url: https://oHaruki.github.io/UmaCore

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Introduction: index.md
  - Getting Started: getting-started.md
  - FAQ: faq.md
  - Setup Guide: setup.md
  - Quota System: quota-system.md
  - Data Sources: data-sources.md
  - Commands:
      - Overview: commands/README.md
      - Club Management: commands/club-management.md
      - Quota Management: commands/quota-management.md
      - Channel Settings: commands/channel-settings.md
      - Member Management: commands/member-management.md
      - User Commands: commands/user-commands.md
      - Charts & Stats: commands/charts.md

  - Legal:
      - Terms of Service: terms-of-service.md
      - Privacy Policy: privacy-policy.md

docs_dir: docs
